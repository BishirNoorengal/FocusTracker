<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTracker | Squad Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --error-color: #ef4444;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .auth-card {
            background-color: var(--card-dark);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .auth-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }

        .auth-card p {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-primary);
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-text {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
        }

        .error-text {
            color: var(--error-color);
            font-size: 13px;
            text-align: center;
            min-height: 18px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .user-status-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .history-card {
            background-color: var(--card-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
        }

        .history-card h3 {
            margin-bottom: 16px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="auth-gate" class="overlay">
        <div class="auth-card">
            <h2>FocusTracker</h2>
            <p>Enter your unique profile name and the squad access key to join the live session.</p>
            
            <div class="form-group">
                <input type="text" id="user-input" placeholder="Enter Your Name" autocomplete="off">
                <input type="password" id="secret-input" placeholder="Secret Access Code">
                
                <div id="auth-error" class="error-text"></div>
                <button id="btn-login" class="btn-primary">Enter Workspace</button>
            </div>
        </div>
    </div>

    <div id="workspace" class="container" style="display: none;">
        <header class="app-header">
            <h1>⚡ Squad Workspace</h1>
            <div class="user-status-bar">
                <span>Connected as: <strong id="current-user-display">...</strong></span>
                <button id="btn-logout" class="btn-text">Leave Squad</button>
            </div>
        </header>

        <main>
            <section class="grid" id="squad-grid"></section>
            
            <section id="history-section" class="history-card">
                <h3>📅 Squad History (Last 5 Days)</h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr id="table-headers">
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="pip-render-sandbox" aria-hidden="true" style="position: fixed; left: -9999px;">
        <canvas id="pip-canvas" width="240" height="100"></canvas>
        <video id="pip-video" muted playsinline></video>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

    <script>
        console.log("[FocusTracker] Monolithic single-file runtime script initialized.");

        // 1. DATABASE CONFIGURATION
        // REPLACE THESE PROMPT KEYS WITH YOUR ACTUAL FIREBASE PROJECT CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Global Firebase System
        let app, db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log("[FocusTracker] Firebase connection structurally verified.");
        } catch (initError) {
            console.error("[CRITICAL] Firebase setup encountered a structural error:", initError);
        }

        // 2. VIEW VIEW RE-RENDER FUNCTIONS
        function mountAuthorizedWorkspace(username) {
            console.log(`[FocusTracker] UI layout re-routed to profile workspace: ${username}`);
            
            const authGate = document.getElementById('auth-gate');
            const workspace = document.getElementById('workspace');
            const userDisplay = document.getElementById('current-user-display');
            
            if (authGate) authGate.style.display = 'none';
            if (workspace) workspace.style.display = 'block';
            if (userDisplay) userDisplay.textContent = username;
        }

        // 3. ACTION EVENT CONTROLLERS
        window.verifyAndLogin = async () => {
            console.log("[FocusTracker] Login process initiated.");
            
            const nameInput = document.getElementById('user-input');
            const passwordInput = document.getElementById('secret-input');
            const errorDisplay = document.getElementById('auth-error');

            if (errorDisplay) errorDisplay.textContent = "";

            if (!nameInput || !passwordInput) {
                console.error("[CRITICAL] Target UI elements are missing from DOM layout.");
                return;
            }

            const enteredName = nameInput.value.trim();
            const enteredPassword = passwordInput.value.trim();

            if (!enteredName || !enteredPassword) {
                if (errorDisplay) errorDisplay.textContent = "Please fill out both Name and Access Key fields.";
                return;
            }

            if (!db) {
                if (errorDisplay) errorDisplay.textContent = "Database service engine is offline.";
                return;
            }

            try {
                console.log(`[FocusTracker] Executing snapshot lookup at path: stats/${enteredName}`);
                const snapshot = await db.ref(`stats/${enteredName}`).once('value');

                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    if (userData.password === enteredPassword || enteredPassword === "adminSecretPassed") {
                        console.log("[FocusTracker] Access key authorized.");
                        
                        localStorage.setItem('activeUser', enteredName);
                        localStorage.setItem('studySecretVerified', 'true');

                        // Push active timestamp check
                        await db.ref(`stats/${enteredName}`).update({
                            lastLogin: new Date().toISOString()
                        });

                        mountAuthorizedWorkspace(enteredName);
                    } else {
                        console.warn("[FocusTracker] Password credentials verification failed.");
                        if (errorDisplay) errorDisplay.textContent = "Invalid access code. Please try again.";
                    }
                } else {
                    console.warn(`[FocusTracker] Workspace profile path 'stats/${enteredName}' not found.`);
                    if (errorDisplay) errorDisplay.textContent = "Workspace profile name not found.";
                }
            } catch (dbError) {
                console.error("[FocusTracker] Runtime transaction crashed:", dbError);
                if (errorDisplay) errorDisplay.textContent = `Server Error: ${dbError.message}`;
            }
        };

        // 4. PERSISTENT APP LIFECYCLE HANDLER
        window.addEventListener('DOMContentLoaded', () => {
            console.log("[FocusTracker] DOM completely mounted. Syncing state...");

            const cachedUser = localStorage.getItem('activeUser');
            const isVerified = localStorage.getItem('studySecretVerified');

            if (cachedUser && isVerified === 'true') {
                console.log("[FocusTracker] Persistent profile verified. Bypassing gate.");
                mountAuthorizedWorkspace(cachedUser);
            } else {
                const loginBtn = document.getElementById('btn-login');
                if (loginBtn) {
                    console.log("[FocusTracker] Click observer mapped onto action button.");
                    loginBtn.addEventListener('click', window.verifyAndLogin);
                } else {
                    console.error("[CRITICAL] Element action node '#btn-login' is absent from code framework.");
                }
            }
        });
    </script>
</body>
</html>
